# MineInsight baseline training config -- paper-aligned defaults
# Paper: arXiv 2506.04842 (dataset paper, no specific training recipe)
# These are sensible defaults for YOLOv8 fine-tuning on this dataset.

[model]
architecture = "yolov8"
backbone = "cspdarknet_nano"
num_classes = 58
input_size = [640, 640]
# Modalities: "rgb", "lwir", "swir", "rgb+lwir", "rgb+lwir+swir"
modality = "rgb"
pretrained = ""  # Custom CSPDarknet-nano backbone, trained from scratch

[model.fusion]
enabled = false
method = "concat"           # concat | attention | add
fusion_channels = 256

[training]
batch_size = "auto"
learning_rate = 0.001
epochs = 100
optimizer = "adamw"
weight_decay = 0.01
scheduler = "cosine"
warmup_ratio = 0.05
precision = "bf16"
gradient_accumulation = 1
max_grad_norm = 1.0
seed = 42

[data]
dataset_root = "/mnt/train-data/datasets/mineinsight"
# Track 1 Seq 1 (day) + Track 2 Seq 1 (day) available initially
# Will split track1_seq1 into train/val, track2_seq1 as test
train_sequences = ["track1_seq1"]
val_sequences = ["track2_seq1"]
test_sequences = ["track2_seq1"]
num_workers = 4
pin_memory = true

[data.augmentation]
mosaic = true
mixup = true
hsv_h = 0.015
hsv_s = 0.7
hsv_v = 0.4
flip_lr = 0.5
flip_ud = 0.0
scale = [0.5, 1.5]

[loss]
box_weight = 7.5
cls_weight = 0.5
obj_weight = 1.0
box_loss = "ciou"
cls_loss = "focal"
focal_alpha = 0.25
focal_gamma = 2.0

[checkpoint]
output_dir = "/mnt/artifacts-datai/checkpoints/project_mineinsight"
save_every_n_steps = 500
keep_top_k = 2
metric = "val_loss"
mode = "min"

[early_stopping]
enabled = true
patience = 20
min_delta = 0.001

[logging]
log_dir = "/mnt/artifacts-datai/logs/project_mineinsight"
tensorboard_dir = "/mnt/artifacts-datai/tensorboard/project_mineinsight"
