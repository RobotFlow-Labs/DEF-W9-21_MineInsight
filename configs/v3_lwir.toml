# MineInsight v3 LWIR — MONSTER config
# COCO-pretrained backbone + ALL available LWIR sequences

[model]
architecture = "yolov8"
backbone = "cspdarknet_nano"
num_classes = 58
input_size = [640, 640]
modality = "lwir"
pretrained = "/mnt/artifacts-datai/checkpoints/project_mineinsight_coco_pretrain/coco_pretrained.pth"

[model.fusion]
enabled = false
method = "concat"
fusion_channels = 256

[training]
batch_size = 96
learning_rate = 0.0003
epochs = 150
optimizer = "adamw"
weight_decay = 0.01
scheduler = "cosine"
warmup_ratio = 0.03
precision = "bf16"
gradient_accumulation = 1
max_grad_norm = 1.0
seed = 42

[data]
dataset_root = "/mnt/train-data/datasets/mineinsight"
train_sequences = ["track_1_s1", "track_2_s1"]
val_sequences = ["track_2_s1"]
test_sequences = ["track_2_s1"]
num_workers = 8
pin_memory = true

[data.augmentation]
mosaic = true
mixup = true
hsv_h = 0.02
hsv_s = 0.8
hsv_v = 0.5
flip_lr = 0.5
flip_ud = 0.0
scale = [0.3, 1.7]

[loss]
box_weight = 7.5
cls_weight = 0.5
obj_weight = 1.5
box_loss = "ciou"
cls_loss = "focal"
focal_alpha = 0.25
focal_gamma = 2.0

[checkpoint]
output_dir = "/mnt/artifacts-datai/checkpoints/project_mineinsight_v3_lwir"
save_every_n_steps = 500
keep_top_k = 2
metric = "val_loss"
mode = "min"

[early_stopping]
enabled = true
patience = 25
min_delta = 0.001

[logging]
log_dir = "/mnt/artifacts-datai/logs/project_mineinsight_v3_lwir"
tensorboard_dir = "/mnt/artifacts-datai/tensorboard/project_mineinsight_v3_lwir"
