# MineInsight multi-modal fusion training config
# RGB + LWIR fusion for improved landmine detection

[model]
architecture = "yolov8"
backbone = "cspdarknet_nano"
num_classes = 35
input_size = [640, 640]
modality = "rgb+lwir"
pretrained = "/mnt/forge-data/models/yolov8n.pt"

[model.fusion]
enabled = true
method = "attention"        # attention-based fusion
fusion_channels = 256

[training]
batch_size = "auto"
learning_rate = 0.0005
epochs = 100
optimizer = "adamw"
weight_decay = 0.01
scheduler = "cosine"
warmup_ratio = 0.05
precision = "bf16"
gradient_accumulation = 1
max_grad_norm = 1.0
seed = 42

[data]
dataset_root = "/mnt/forge-data/datasets/mineinsight"
train_sequences = ["track1_seq1", "track1_seq2", "track2_seq1", "track2_seq2"]
val_sequences = ["track3_seq1"]
test_sequences = ["track3_seq2"]
num_workers = 4
pin_memory = true

[data.augmentation]
mosaic = false
mixup = false
hsv_h = 0.015
hsv_s = 0.7
hsv_v = 0.4
flip_lr = 0.5
flip_ud = 0.0
scale = [0.5, 1.5]

[loss]
box_weight = 7.5
cls_weight = 0.5
obj_weight = 1.0
box_loss = "ciou"
cls_loss = "focal"
focal_alpha = 0.25
focal_gamma = 2.0

[checkpoint]
output_dir = "/mnt/artifacts-datai/checkpoints/project_mineinsight_fusion"
save_every_n_steps = 500
keep_top_k = 2
metric = "val_loss"
mode = "min"

[early_stopping]
enabled = true
patience = 20
min_delta = 0.001

[logging]
log_dir = "/mnt/artifacts-datai/logs/project_mineinsight_fusion"
tensorboard_dir = "/mnt/artifacts-datai/tensorboard/project_mineinsight_fusion"
