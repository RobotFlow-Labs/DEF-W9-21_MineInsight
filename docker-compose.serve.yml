version: "3.8"

services:
  mineinsight-serve:
    build:
      context: .
      dockerfile: Dockerfile.serve
    image: anima-mineinsight:latest
    container_name: anima-mineinsight
    profiles: ["serve", "api"]
    ports:
      - "${ANIMA_SERVE_PORT:-8080}:8080"
    environment:
      - ANIMA_MODULE_NAME=mineinsight
      - ANIMA_MODULE_VERSION=0.1.0
      - ANIMA_HF_REPO=ilessio-aiflowlab/project_mineinsight
      - ANIMA_DEVICE=auto
      - ANIMA_WEIGHT_FORMAT=auto
      - ANIMA_SERVE_PORT=8080
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - /mnt/forge-data/models:/data/models:ro
      - weights_cache:/data/weights
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    network_mode: host
    restart: unless-stopped

  mineinsight-ros2:
    build:
      context: .
      dockerfile: Dockerfile.serve
    image: anima-mineinsight:latest
    container_name: anima-mineinsight-ros2
    profiles: ["ros2"]
    environment:
      - ANIMA_MODULE_NAME=mineinsight
      - ANIMA_DEVICE=auto
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    volumes:
      - /mnt/forge-data/models:/data/models:ro
      - weights_cache:/data/weights
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    network_mode: host
    command: ["python", "-m", "mineinsight.serve", "--ros2"]

  mineinsight-test:
    build:
      context: .
      dockerfile: Dockerfile.serve
    image: anima-mineinsight:latest
    container_name: anima-mineinsight-test
    profiles: ["test"]
    environment:
      - ANIMA_DEVICE=cpu
    command: ["python", "-m", "pytest", "tests/", "-v"]

volumes:
  weights_cache:
